version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - cd docs/source && doxygen
      - cd docs && python make_mock_libs.py
      - cd docs && doxysphinx build source build source/dox/html

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  builder: html
  configuration: docs/source/conf.py
  fail_on_warning: false
